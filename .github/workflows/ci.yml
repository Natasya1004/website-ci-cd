name: Website CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cek File
        run: ls

      - name: Validasi HTML
        run: |
          if [ -f index.html ]; then
            echo "index.html ditemukan"
          else
            echo "index.html tidak ditemukan"
            exit 1
          fi

      - name: CI Berhasil
        run: echo "Proses CI selesai"